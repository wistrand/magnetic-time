<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>magnetic-time — live</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #10121a;
    overflow: hidden;
  }
  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
    outline: none;
  }
  #loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #8a91a8;
    font: 15px system-ui, sans-serif;
  }
</style>
</head>
<body>
<div id="loading">loading simulation…</div>
<canvas id="clock_canvas"></canvas>
<script type="module">
  import init from "./pkg/magnetic-time.js";
  init().then(() => {
    document.getElementById("loading").remove();
  }).catch((e) => {
    document.getElementById("loading").textContent = "failed to load: " + e;
  });
</script>
</body>
</html>
